<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1131px" preserveAspectRatio="none" style="width:751px;height:1131px;background:#FFFFFF;" version="1.1" viewBox="0 0 751 1131" width="751px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="387" x="177.5" y="38.5181">Voice Pipeline &#8212; Keyword Spotting</text><!--entity mic--><g id="elem_mic"><rect fill="#FFFFFF" height="58.1358" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.0;" width="136" x="374" y="62.9641"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="116" x="384" y="87.93">PDM Microphone</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="79" x="384" y="106.998">(MP34DT06)</text></g><!--entity filter--><g id="elem_filter"><rect fill="#ADD8E6" height="58.1358" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.0;" width="134" x="375" y="211.4641"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="80" x="385" y="236.43">PDM &#8594; PCM</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="114" x="385" y="255.498">Decimation Filter</text></g><g id="elem_GMN4"><path d="M544,199.9641 L544,236.4641 L509.07,240.4641 L544,244.4641 L544,280.7882 A0,0 0 0 0 544,280.7882 L744,280.7882 A0,0 0 0 0 744,280.7882 L744,209.9641 L734,199.9641 L544,199.9641 A0,0 0 0 0 544,199.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><path d="M734,199.9641 L734,209.9641 L744,209.9641 L734,199.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="178" x="550" y="218.8611">ESP32-S3 I2S in PDM RX mode</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="94" x="550" y="236.5671">64&#215; decimation:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="154" x="550" y="254.2731">&#183; Input: PDM @ 1.024 MHz</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="179" x="550" y="271.9792">&#183; Output: PCM 16-bit @ 16 kHz</text></g><!--entity dma--><g id="elem_dma"><rect fill="#FFFFE0" height="58.1358" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.0;" width="203" x="340.5" y="359.9641"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="78" x="350.5" y="384.93">DMA Buffer</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="183" x="350.5" y="403.998">20ms frames (320 samples)</text></g><!--entity vad--><g id="elem_vad"><rect fill="#90EE90" height="58.1358" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.0;" width="137" x="373.5" y="525.9641"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="27" x="383.5" y="550.93">VAD</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="117" x="383.5" y="569.998">(WebRTC VAD-RS)</text></g><g id="elem_GMN9"><path d="M546,496.9641 L546,550.9641 L510.84,554.9641 L546,558.9641 L546,613.2002 A0,0 0 0 0 546,613.2002 L734,613.2002 A0,0 0 0 0 734,613.2002 L734,506.9641 L724,496.9641 L546,496.9641 A0,0 0 0 0 546,496.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><path d="M724,496.9641 L724,506.9641 L734,506.9641 L724,496.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="131" x="552" y="515.8611">Frame: 20ms @ 16kHz</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="167" x="552" y="533.5671">Modes: 0-3 (aggressiveness)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="142" x="552" y="551.2731">Mode 2 used (balanced)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="57" x="552" y="568.9792">CPU: ~1%</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="67" x="552" y="586.6852">Flash: +5KB</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="64" x="552" y="604.3912">RAM: +1KB</text></g><!--entity goertzel--><g id="elem_goertzel"><rect fill="#F08080" height="58.1358" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.0;" width="139" x="17.5" y="756.4641"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="90" x="27.5" y="781.43">Goertzel KWS</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="119" x="27.5" y="800.498">(Keyword Spotter)</text></g><g id="elem_GMN13"><path d="M191.5,691.9641 L191.5,781.4641 L156.73,785.4641 L191.5,789.4641 L191.5,879.0243 A0,0 0 0 0 191.5,879.0243 L402.5,879.0243 A0,0 0 0 0 402.5,879.0243 L402.5,701.9641 L392.5,691.9641 L191.5,691.9641 A0,0 0 0 0 191.5,691.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><path d="M392.5,691.9641 L392.5,701.9641 L402.5,701.9641 L392.5,691.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="130" x="197.5" y="710.8611">Fixed-point Q15 math</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="190" x="197.5" y="728.5671">Per keyword: 2-4 frequency bins</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="122" x="197.5" y="746.2731">Configurable via BLE</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="67" x="197.5" y="763.9792">Flash: +7KB</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="74" x="197.5" y="781.6852">RAM: +0.5KB</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="138" x="197.5" y="799.3912">CPU: ~0.5% avg (gated)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="3" x="197.5" y="817.0972">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="86" x="197.5" y="834.8032">Example: "fire"</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="161" x="197.5" y="852.5092">Bins: 350Hz, 700Hz, 1400Hz</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187" x="197.5" y="870.2153">Threshold: magnitude &gt; 0x1000</text></g><!--entity config--><g id="elem_config"><path d="M24,531.4641 C24,521.4641 87,521.4641 87,521.4641 C87,521.4641 150,521.4641 150,531.4641 L150,578.5999 C150,588.5999 87,588.5999 87,588.5999 C87,588.5999 24,588.5999 24,578.5999 L24,531.4641 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M24,531.4641 C24,541.4641 87,541.4641 87,541.4641 C87,541.4641 150,541.4641 150,531.4641 " fill="none" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="106" x="34" y="560.43">Keyword Config</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="102" x="34" y="579.498">(from SD/Flash)</text></g><!--entity event--><g id="elem_event"><rect fill="#F5DEB3" height="39.0679" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.0;" width="134" x="20" y="957.9641"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="114" x="30" y="982.93">Event Dispatcher</text></g><!--entity Main Supervisor--><g id="elem_Main Supervisor"><rect fill="#FFFFFF" height="49.0679" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.0;" width="150" x="12" y="1075.9641"/><rect fill="#FFFFFF" height="10" style="stroke:#000000;stroke-width:1.0;" width="15" x="142" y="1080.9641"/><rect fill="#FFFFFF" height="2" style="stroke:#000000;stroke-width:1.0;" width="4" x="140" y="1082.9641"/><rect fill="#FFFFFF" height="2" style="stroke:#000000;stroke-width:1.0;" width="4" x="140" y="1086.9641"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="110" x="27" y="1110.93">Main Supervisor</text></g><g id="elem_GMN27"><path d="M438,744.9641 L438,825.7882 L700,825.7882 L700,754.9641 L690,744.9641 L438,744.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><path d="M690,744.9641 L690,754.9641 L700,754.9641 L690,744.9641 " fill="#FFFFEE" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="126" x="444" y="763.8611">VAD Gate advantage:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="241" x="444" y="781.5671">&#183; 90% CPU reduction vs. continuous KWS</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="142" x="444" y="799.2731">&#183; Reduces false positives</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="180" x="444" y="816.9792">&#183; Only processes actual speech</text></g><!--link mic to filter--><g id="link_mic_filter"><path d="M442,121.2141 C442,147.1541 442,179.3941 442,205.3041 " fill="none" id="mic-to-filter" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="442,211.3041,446,202.3041,442,206.3041,438,202.3041,442,211.3041" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="90" x="443" y="165.8611">PDM bitstream</text></g><!--link filter to dma--><g id="link_filter_dma"><path d="M442,269.7141 C442,295.6541 442,327.8941 442,353.8041 " fill="none" id="filter-to-dma" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="442,359.8041,446,350.8041,442,354.8041,438,350.8041,442,359.8041" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="48" x="443" y="325.8611">PCM i16</text></g><!--link dma to vad--><g id="link_dma_vad"><path d="M402.11,418.1741 C388.25,431.6341 377.41,448.7741 383,466.9641 C389.64,488.5941 399.9544,504.9889 412.6844,520.9889 " fill="none" id="dma-to-vad" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="416.42,525.6841,413.9467,516.1509,413.307,521.7714,407.6864,521.1317,416.42,525.6841" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="70" x="384" y="462.8611">20ms frame</text></g><!--link vad to dma--><g id="link_vad_dma"><path d="M451.23,525.6541 C457.04,504.3341 462.79,474.3441 459,447.9641 C457.58,438.0941 456.6311,433.3029 453.7811,423.9629 " fill="none" id="vad-to-dma" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="452.03,418.2241,450.8308,427.9997,453.4893,423.0064,458.4825,425.6648,452.03,418.2241" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="132" x="462" y="462.8611">silence (discard frame)</text></g><!--link vad to goertzel--><g id="link_vad_goertzel"><path d="M391.86,584.0941 C351.96,606.1341 294.47,637.1141 243,661.9641 C212.89,676.5041 201.35,672.7241 174,691.9641 C148.58,709.8541 128.5598,731.4425 112.2898,751.4125 " fill="none" id="vad-to-goertzel" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="108.5,756.0641,117.2857,751.6132,111.6581,752.1878,111.0836,746.5602,108.5,756.0641" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="188" x="278" y="657.8611">voice frame (if speech detected)</text></g><!--link config to goertzel--><g id="link_config_goertzel"><path d="M87,588.7041 C87,633.7441 87,708.0541 87,750.4541 " fill="none" id="config-to-goertzel" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="87,756.4541,91,747.4541,87,751.4541,83,747.4541,87,756.4541" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="146" x="88" y="657.8611">frequencies + thresholds</text></g><!--link goertzel to event--><g id="link_goertzel_event"><path d="M87,814.5041 C87,853.8241 87,918.3141 87,951.8041 " fill="none" id="goertzel-to-event" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="87,957.8041,91,948.8041,87,952.8041,83,948.8041,87,957.8041" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="140" x="88" y="923.8611">keyword_id, confidence</text></g><!--link event to Main Supervisor--><g id="link_event_Main Supervisor"><path d="M87,997.1041 C87,1018.1841 87,1046.5641 87,1069.5941 " fill="none" id="event-to-Main Supervisor" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="87,1075.5941,91,1066.5941,87,1070.5941,83,1066.5941,87,1075.5941" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="124" x="88" y="1041.8611">Trigger sound + light</text></g><!--link vad to GMN27--><g id="link_vad_GMN27"><path d="M469.17,584.0041 C483.85,600.2541 501.49,621.6641 514,642.9641 C533.02,675.3541 547.91,715.5241 557.37,744.7841 " fill="none" id="vad-GMN27" style="stroke:#000000;stroke-width:1.0;stroke-dasharray:7.0,7.