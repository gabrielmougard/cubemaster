name: Deploy Bikeshed spec

on:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'doc/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-diagrams:
    name: Build PlantUML diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload diagram artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diagrams
          path: doc/diagrams/img/*.svg
          retention-days: 1

  build-spec:
    name: Build Bikeshed spec
    needs: build-diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download diagrams
        uses: actions/download-artifact@v4
        with:
          name: diagrams
          path: doc/diagrams/img/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bikeshed
        run: pip install bikeshed

      - name: Build spec
        working-directory: doc
        run: bikeshed spec cubemaster-mvp.bs cubemaster-mvp.html

      - name: Copy assets
        run: |
          mkdir -p _site/diagrams/img
          cp doc/cubemaster-mvp.html _site/index.html
          cp doc/diagrams/img/*.svg _site/diagrams/img/ 2>/dev/null || true

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-spec
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
