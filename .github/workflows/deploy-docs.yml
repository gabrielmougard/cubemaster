name: Deploy Bikeshed spec

on:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'doc/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-spec:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bikeshed
        run: pip install bikeshed

      - name: Build spec
        working-directory: doc
        run: bikeshed spec cubemaster-mvp.bs cubemaster-mvp.html

      - name: Prepare site
        run: |
          mkdir -p _site/diagrams/img
          cp doc/cubemaster-mvp.html _site/index.html
          cp doc/diagrams/img/*.svg _site/diagrams/img/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-spec
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
